<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vaquill</title>
    <style>
      /* Critical CSS for fast initial paint */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        color: #374151;
        background-color: #f9fafb;
      }
      #app {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      /* Loading state */
      .loading-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        padding: 24px;
      }
      .loading-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #e5e7eb;
        border-top-color: var(--color-primary, #4f46e5);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .loading-text {
        margin-top: 12px;
        color: #6b7280;
        font-size: 0.875rem;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Loading state while Svelte initializes -->
      <div class="loading-container" id="loading">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading Vaquill...</p>
      </div>
    </div>
    <script type="module" src="../src/sidebar/main.ts"></script>
    <script>
      // Remove loading state when app mounts
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loading = document.getElementById('loading');
          if (loading && loading.parentNode.children.length > 1) {
            loading.remove();
          }
        }, 100);
      });
    </script>
  </body>
</html>
